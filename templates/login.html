{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 450px; margin: 4rem auto;">
    <div class="glass-card">
        <h2 style="text-align: center; margin-bottom: 2rem;">Sign In</h2>
        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 1rem;">Login</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
            Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary); text-decoration: none;">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
