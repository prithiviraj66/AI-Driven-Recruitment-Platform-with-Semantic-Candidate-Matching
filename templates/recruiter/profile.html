{% extends "base.html" %}

{% block title %}Company Profile | JobMatch Recruiter{% endblock %}

{% block content %}
<div class="container" style="max-width: 800px;">
    <div style="margin-bottom: 2rem;">
        <a href="{{ url_for('recruiter_dashboard') }}" style="color: var(--text-secondary); text-decoration: none;">&larr; Back to Dashboard</a>
        <h1 style="margin-top: 1rem;">Company <span>Profile</span></h1>
        <p style="color: var(--text-secondary); margin-top: 0.25rem;">Manage the public profile and settings of your organization.</p>
    </div>

    <div class="glass-card">
        <form method="POST">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div class="form-group">
                    <label for="company_name">Company Name</label>
                    <input type="text" id="company_name" name="company_name" value="{{ profile.company_name }}" required placeholder="e.g. Acme Corporation">
                </div>
                <div class="form-group">
                    <label for="industry">Industry / Sector</label>
                    <input type="text" id="industry" name="industry" value="{{ profile.industry or '' }}" placeholder="e.g. Technology, Finance, Healthcare">
                </div>
            </div>

            <div class="form-group">
                <label for="website">Website URL</label>
                <input type="url" id="website" name="website" value="{{ profile.website or '' }}" placeholder="e.g. https://www.company.com">
            </div>

            <div class="form-group">
                <label for="description">About the Company / Description</label>
                <textarea id="description" name="description" rows="8" placeholder="Tell candidates about your company mission, culture, and what you do..." style="width: 100%; border: 1px solid var(--glass-border); border-radius: 8px; background: rgba(255, 255, 255, 0.03); color: white; padding: 0.75rem; outline: none; font-family: inherit;">{{ profile.description or '' }}</textarea>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 2.5rem;">
                <button type="submit" class="btn btn-primary" style="flex: 1; padding: 1rem; font-size: 1.1rem;">Save Changes</button>
                <a href="{{ url_for('recruiter_dashboard') }}" class="btn" style="border: 1px solid var(--glass-border); padding: 1rem; display: flex; align-items: center; justify-content: center; text-decoration: none;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
