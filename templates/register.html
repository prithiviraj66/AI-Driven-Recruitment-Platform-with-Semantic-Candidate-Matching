{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 450px; margin: 4rem auto;">
    <div class="glass-card">
        <h2 style="text-align: center; margin-bottom: 2rem;">Create Account</h2>
        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Account Type</label>
                <select name="role" id="roleSelect">
                    <option value="candidate">I'm a Job Seeker</option>
                    <option value="recruiter">I'm a Company Recruiter</option>
                    <option value="admin">I'm a Platform Admin</option>
                </select>
            </div>
            <div id="recruiterFields" style="display: none; transition: 0.3s;">
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" name="company_name" placeholder="e.g. Tesla Inc">
                </div>
                <div class="form-group">
                    <label>Website URL</label>
                    <input type="url" name="website" placeholder="e.g. https://www.tesla.com">
                </div>
                <div class="form-group">
                    <label>Industry / Sector</label>
                    <input type="text" name="industry" placeholder="e.g. Technology, Finance">
                </div>
                <div class="form-group">
                    <label>About the Company / Description</label>
                    <textarea name="description" rows="3" placeholder="Describe the company's mission and culture..." style="width: 100%; border: 1px solid var(--glass-border); border-radius: 8px; background: rgba(255, 255, 255, 0.03); color: white; padding: 0.75rem; outline: none; font-family: inherit; resize: vertical;"></textarea>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 1rem;">Sign Up</button>
        </form>

        <script>
        document.getElementById('roleSelect').addEventListener('change', function() {
            var recFields = document.getElementById('recruiterFields');
            var companyInput = recFields.querySelector('input[name="company_name"]');
            if (this.value === 'recruiter') {
                recFields.style.display = 'block';
                companyInput.setAttribute('required', 'required');
            } else {
                recFields.style.display = 'none';
                companyInput.removeAttribute('required');
                companyInput.value = '';
                recFields.querySelectorAll('input, textarea').forEach(function(el) {
                    el.value = '';
                });
            }
        });
        </script>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
            Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary); text-decoration: none;">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
